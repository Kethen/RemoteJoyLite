name: Build SDL package

on: [ push, pull_request, workflow_dispatch ]

env:
  SDL_VERSION: "3.2.8"
  LIBUSB_VERSION: "1.0.27"

jobs:
  build_sdl:
    name: SDL – ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Native Linux x86_64 ─────────────────────────────────────────
          - name: linux-x86_64
            runs-on: ubuntu-22.04
            os: linux
            output: RemoteJoyLite-cross

          # ── Native macOS (arm64 runner) ─────────────────────────────────
          - name: macos-arm64
            runs-on: macos-latest
            os: macos
            output: RemoteJoyLite-cross

          # ── Windows x86_64 (cross-compiled from Linux with mingw) ───────
          - name: windows-x86_64
            runs-on: ubuntu-22.04
            os: windows
            output: RemoteJoyLite-cross.exe

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set sha env var
        shell: bash
        run: echo "sha_name=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      # ── Linux: build SDL3 from source, libusb from apt ──────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build libusb-1.0-0-dev

          git clone https://github.com/libsdl-org/SDL \
            --branch release-${SDL_VERSION%.*}.x \
            --depth 1 \
            SDL_src

          cmake -S SDL_src -B SDL_src/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST_LIBRARY=OFF \
            -GNinja
          cmake --build SDL_src/build
          sudo cmake --install SDL_src/build

      # ── macOS: everything via Homebrew ───────────────────────────────────
      - name: Install macOS dependencies
        if: matrix.os == 'macos'
        run: brew install cmake ninja sdl3 libusb

      # ── Windows: install mingw, download SDL3 + libusb prebuilts ────────
      - name: Install Windows cross-compile dependencies
        if: matrix.os == 'windows'
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build mingw-w64 p7zip-full unzip

          # SDL3 mingw development package
          curl -sL \
            "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL3-devel-${SDL_VERSION}-mingw.zip" \
            -o SDL3-mingw.zip
          unzip -q SDL3-mingw.zip -d SDL3-mingw

          # libusb Windows binaries (headers + MinGW import/static libs)
          curl -sL \
            "https://github.com/libusb/libusb/releases/download/v${LIBUSB_VERSION}/libusb-${LIBUSB_VERSION}.7z" \
            -o libusb.7z
          7z x libusb.7z -olibusb-release -y

      # ── Build: Linux / macOS ─────────────────────────────────────────────
      - name: Build (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          cmake -S RemoteJoyLite_sdl -B sdl_build \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja
          cmake --build sdl_build

      # ── Build: Windows cross-compile ─────────────────────────────────────
      - name: Write mingw toolchain file
        if: matrix.os == 'windows'
        run: |
          cat > toolchain-mingw64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_C_COMPILER   x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_RC_COMPILER  x86_64-w64-mingw32-windres)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

      - name: Build (Windows)
        if: matrix.os == 'windows'
        run: |
          SDL3_CMAKE_DIR="${GITHUB_WORKSPACE}/SDL3-mingw/SDL3-${SDL_VERSION}/x86_64-w64-mingw32/lib/cmake/SDL3"
          LIBUSB_ROOT="${GITHUB_WORKSPACE}/libusb-release"

          cmake -S RemoteJoyLite_sdl -B sdl_build \
            -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/toolchain-mingw64.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL3_DIR="${SDL3_CMAKE_DIR}" \
            -DLIBUSB_ROOT="${LIBUSB_ROOT}" \
            -GNinja
          cmake --build sdl_build

          # Bundle the runtime DLLs next to the executable
          SDL3_BIN="${GITHUB_WORKSPACE}/SDL3-mingw/SDL3-${SDL_VERSION}/x86_64-w64-mingw32/bin"
          LIBUSB_DLL="${LIBUSB_ROOT}/MinGW64/dll"
          cp "${SDL3_BIN}/SDL3.dll"         sdl_build/
          cp "${LIBUSB_DLL}/libusb-1.0.dll" sdl_build/

      # ── Collect artifacts ────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoteJoyLite-sdl-${{ matrix.name }}-${{ env.sha_name }}
          path: |
            sdl_build/${{ matrix.output }}
            sdl_build/SDL3.dll
            sdl_build/libusb-1.0.dll
          if-no-files-found: error
